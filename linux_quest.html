<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐧 Linux Quest · Terminal Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', 'Fira Code', monospace;
    }

    /* Tela de animação inicial */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: fadeOut 0.8s ease-in-out 4s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    .game-title {
      color: #00ff00;
      font-size: 4rem;
      font-weight: bold;
      text-shadow: 0 0 20px #00ff00, 0 0 40px #00aa00;
      animation: glitch 1.5s infinite;
      letter-spacing: 8px;
    }

    @keyframes glitch {
      0%, 100% { transform: skew(0deg, 0deg); opacity: 1; }
      95% { transform: skew(2deg, 1deg); opacity: 0.9; text-shadow: 3px 0 #ff0000, -3px 0 #0000ff; }
      96% { transform: skew(-2deg, -1deg); opacity: 1; text-shadow: none; }
      97% { transform: skew(3deg, -1deg); opacity: 0.95; text-shadow: -3px 0 #ff0000, 3px 0 #0000ff; }
    }

    .subtitle {
      color: #00aa00;
      font-size: 1.2rem;
      margin-top: 20px;
      opacity: 0;
      animation: typewriter 2s steps(40) 1s forwards;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid #00ff00;
      width: 0;
    }

    @keyframes typewriter {
      0% { width: 0; opacity: 0; }
      10% { opacity: 1; }
      100% { width: 280px; opacity: 1; }
    }

    .loading-bar {
      width: 300px;
      height: 4px;
      background: #111;
      margin-top: 40px;
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #00aa00);
      animation: loading 3.5s ease-in-out forwards;
      box-shadow: 0 0 10px #00ff00;
    }

    @keyframes loading {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    .hint-text {
      color: #333;
      margin-top: 20px;
      font-size: 0.8rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* Terminal principal */
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .terminal-header {
      background: #1a1a1a;
      padding: 8px 15px;
      display: flex;
      align-items: center;
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid #333;
    }

    .window-controls {
      display: flex;
      gap: 8px;
      margin-right: 20px;
    }

    .control {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .close { background: #ff5f56; }
    .minimize { background: #ffbd2e; }
    .maximize { background: #27c93f; }

    .terminal-title {
      color: #00ff00;
      font-size: 0.9rem;
      flex: 1;
    }

    .user-badge {
      color: #888;
      font-size: 0.8rem;
    }

    /* Área do terminal */
    #terminal {
      flex: 1;
      background: #0c0c0c;
      padding: 20px;
      overflow-y: auto;
      font-family: 'Courier New', 'Fira Code', monospace;
      font-size: 1rem;
      border: 1px solid #222;
      border-top: none;
      border-radius: 0 0 8px 8px;
    }

    #terminal-content {
      color: #00ff00;
      line-height: 1.6;
    }

    .command-line {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }

    .prompt {
      color: #00ff00;
      margin-right: 10px;
      font-weight: bold;
    }

    #command-input {
      background: transparent;
      border: none;
      color: #00ff00;
      font-family: 'Courier New', 'Fira Code', monospace;
      font-size: 1rem;
      flex: 1;
      outline: none;
      caret-color: #00ff00;
    }

    .output-line {
      color: #ccc;
      margin: 5px 0;
    }

    .error-line {
      color: #ff4444;
    }

    .success-line {
      color: #00ff88;
    }

    .info-line {
      color: #44aaff;
    }

    .mission-line {
      color: #ffaa00;
      font-weight: bold;
      margin: 10px 0;
      padding: 10px;
      background: rgba(255,170,0,0.1);
      border-left: 3px solid #ffaa00;
    }

    /* Barra lateral de progresso */
    .sidebar {
      position: fixed;
      right: 20px;
      top: 80px;
      width: 250px;
      background: rgba(20,20,20,0.95);
      border: 1px solid #00ff00;
      border-radius: 10px;
      padding: 15px;
      color: #00ff00;
      backdrop-filter: blur(5px);
      box-shadow: 0 0 20px rgba(0,255,0,0.2);
    }

    .sidebar h5 {
      color: #00ff00;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    .progress-section {
      margin-bottom: 20px;
    }

    .level-badge {
      background: #00ff00;
      color: #000;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.8rem;
      display: inline-block;
      margin-bottom: 10px;
    }

    .command-list {
      list-style: none;
      padding: 0;
    }

    .command-list li {
      padding: 5px 0;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .unlocked {
      color: #00ff00;
    }

    .locked {
      color: #555;
    }

    .progress-bar-custom {
      background: #222;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress-fill {
      background: linear-gradient(90deg, #00ff00, #00aa00);
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }

    .help-text {
      font-size: 0.8rem;
      color: #888;
      margin-top: 10px;
    }

    .mission-status {
      color: #ffaa00;
      font-size: 0.9rem;
    }

    /* Responsivo */
    @media (max-width: 768px) {
      .sidebar {
        position: static;
        width: 100%;
        margin-top: 10px;
      }
      
      #game-container {
        position: static;
        height: auto;
        min-height: 100vh;
      }
      
      .game-title {
        font-size: 2.5rem;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: #00ff00;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<!-- Splash Screen Animada -->
<div id="splash-screen">
  <div class="game-title">🐧 LINUX QUEST</div>
  <div class="subtitle">Aprenda comandos. Desbloqueie poderes.</div>
  <div class="loading-bar">
    <div class="loading-progress"></div>
  </div>
  <div class="hint-text">Inicializando terminal...</div>
</div>

<!-- Container do Jogo -->
<div id="game-container">
  <div class="terminal-header">
    <div class="window-controls">
      <span class="control close"></span>
      <span class="control minimize"></span>
      <span class="control maximize"></span>
    </div>
    <div class="terminal-title">aluno@linux-quest: ~</div>
    <div class="user-badge">
      <i class="fas fa-user-ninja"></i> Nível <span id="level-display-header">1</span>
    </div>
  </div>
  
  <div id="terminal">
    <div id="terminal-content">
      <!-- Conteúdo dinâmico do terminal -->
    </div>
    <div class="command-line">
      <span class="prompt">aluno@quest:~$</span>
      <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
    </div>
  </div>
</div>

<!-- Sidebar de Progresso -->
<div class="sidebar">
  <h5><i class="fas fa-terminal"></i> Status da Missão</h5>
  
  <div class="progress-section">
    <span class="level-badge" id="level-badge">Nível 1/10</span>
    <div class="progress-bar-custom">
      <div class="progress-fill" id="xp-bar" style="width: 0%"></div>
    </div>
    <small id="xp-text">0/100 XP</small>
  </div>
  
  <h6 style="color: #00aa00; margin-top: 15px;">
    <i class="fas fa-unlock-alt"></i> Comandos Desbloqueados
  </h6>
  <ul class="command-list" id="unlocked-commands-list">
    <!-- Preenchido via JS -->
  </ul>
  
  <h6 style="color: #555; margin-top: 15px;">
    <i class="fas fa-lock"></i> Bloqueados
  </h6>
  <ul class="command-list" id="locked-commands-list">
    <!-- Preenchido via JS -->
  </ul>
  
  <div class="help-text">
    <i class="fas fa-lightbulb"></i> Digite <span style="color:#00ff00">help</span> para ver comandos disponíveis<br>
    <i class="fas fa-flag"></i> <span style="color:#00ff00">missao</span> para ver o objetivo atual
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function() {
    // Estado do jogo
    const gameState = {
      level: 1,
      xp: 0,
      xpToNextLevel: 100,
      unlockedCommands: ['help', 'missao', 'clear', 'whoami'],
      completedMissions: [],
      currentMission: 1
    };

    // Banco de missões (cada nível uma missão)
    const missions = [
      {
        level: 1,
        title: "Primeiros Passos",
        description: "Use 'whoami' para descobrir quem você é no sistema.",
        solution: "whoami",
        hint: "Digite: whoami",
        xpReward: 30,
        unlockCommand: "pwd"
      },
      {
        level: 2,
        title: "Onde Estou?",
        description: "Descubra em qual diretório você está usando 'pwd'.",
        solution: "pwd",
        hint: "Digite: pwd (Print Working Directory)",
        xpReward: 30,
        unlockCommand: "ls"
      },
      {
        level: 3,
        title: "Explorador de Arquivos",
        description: "Liste os arquivos do diretório atual com 'ls'.",
        solution: "ls",
        hint: "Digite: ls",
        xpReward: 40,
        unlockCommand: "cd"
      },
      {
        level: 4,
        title: "Navegação Básica",
        description: "Entre no diretório 'documentos' usando 'cd documentos'.",
        solution: "cd documentos",
        hint: "Use: cd documentos",
        xpReward: 40,
        unlockCommand: "mkdir"
      },
      {
        level: 5,
        title: "Criando Estruturas",
        description: "Crie um diretório chamado 'projeto' com 'mkdir projeto'.",
        solution: "mkdir projeto",
        hint: "mkdir projeto",
        xpReward: 50,
        unlockCommand: "touch"
      },
      {
        level: 6,
        title: "Arquivos Vazios",
        description: "Crie um arquivo 'readme.txt' usando 'touch readme.txt'.",
        solution: "touch readme.txt",
        hint: "touch readme.txt",
        xpReward: 50,
        unlockCommand: "echo"
      },
      {
        level: 7,
        title: "Escrevendo Mensagens",
        description: "Use 'echo \"Hello Linux\" > mensagem.txt' para criar um arquivo com conteúdo.",
        solution: "echo \"Hello Linux\" > mensagem.txt",
        hint: "echo \"texto\" > arquivo.txt",
        xpReward: 60,
        unlockCommand: "cat"
      },
      {
        level: 8,
        title: "Lendo Arquivos",
        description: "Leia o conteúdo de 'mensagem.txt' com 'cat mensagem.txt'.",
        solution: "cat mensagem.txt",
        hint: "cat mensagem.txt",
        xpReward: 60,
        unlockCommand: "cp"
      },
      {
        level: 9,
        title: "Cópias de Segurança",
        description: "Copie 'mensagem.txt' para 'backup.txt' usando 'cp mensagem.txt backup.txt'.",
        solution: "cp mensagem.txt backup.txt",
        hint: "cp origem destino",
        xpReward: 70,
        unlockCommand: "mv"
      },
      {
        level: 10,
        title: "Mestre do Terminal",
        description: "Mova (renomeie) 'backup.txt' para 'final.txt' com 'mv backup.txt final.txt'.",
        solution: "mv backup.txt final.txt",
        hint: "mv origem destino",
        xpReward: 100,
        unlockCommand: null
      }
    ];

    // Estado do sistema de arquivos simulado
    const fileSystem = {
      currentPath: '/home/aluno',
      structure: {
        '/home/aluno': {
          type: 'dir',
          content: {
            'documentos': { type: 'dir', content: {} },
            'projeto': { type: 'dir', content: {} },
            'readme.txt': { type: 'file', content: '' },
            'mensagem.txt': { type: 'file', content: 'Hello Linux' }
          }
        }
      }
    };

    // Elementos DOM
    const terminalContent = document.getElementById('terminal-content');
    const commandInput = document.getElementById('command-input');
    const levelBadge = document.getElementById('level-badge');
    const levelDisplayHeader = document.getElementById('level-display-header');
    const xpBar = document.getElementById('xp-bar');
    const xpText = document.getElementById('xp-text');
    const unlockedList = document.getElementById('unlocked-commands-list');
    const lockedList = document.getElementById('locked-commands-list');

    // Comandos disponíveis no jogo
    const allCommands = [
      'help', 'missao', 'clear', 'whoami', 'pwd', 'ls', 
      'cd', 'mkdir', 'touch', 'echo', 'cat', 'cp', 'mv'
    ];

    // Inicialização
    function init() {
      printWelcome();
      updateUI();
      focusInput();
    }

    function printWelcome() {
      clearTerminal();
      appendLine('🐧 Bem-vindo ao Linux Quest!', 'success');
      appendLine('=================================', 'info');
      appendLine('Sistema operacional simulado para aprendizado.', 'output');
      appendLine('Digite "help" para ver os comandos disponíveis.', 'info');
      appendLine('Digite "missao" para ver seu objetivo atual.', 'info');
      appendLine('');
    }

    function clearTerminal() {
      terminalContent.innerHTML = '';
    }

    function appendLine(text, type = 'output') {
      const line = document.createElement('div');
      line.className = `${type}-line`;
      line.innerHTML = text;
      terminalContent.appendChild(line);
      scrollToBottom();
    }

    function scrollToBottom() {
      const terminal = document.getElementById('terminal');
      terminal.scrollTop = terminal.scrollHeight;
    }

    function focusInput() {
      commandInput.focus();
    }

    // Processamento de comandos
    function processCommand(cmd) {
      const args = cmd.trim().split(/\s+/);
      const command = args[0].toLowerCase();
      
      appendLine(`<span style="color:#00ff00">aluno@quest:~$</span> ${cmd}`, 'output');
      
      // Verificar se comando está desbloqueado
      if (!gameState.unlockedCommands.includes(command) && command !== '') {
        appendLine(`Comando '${command}' não encontrado ou ainda não desbloqueado.`, 'error');
        return;
      }
      
      // Executar comando
      switch(command) {
        case 'help': showHelp(); break;
        case 'missao': showMission(); break;
        case 'clear': clearTerminal(); break;
        case 'whoami': executeWhoami(); break;
        case 'pwd': executePwd(); break;
        case 'ls': executeLs(args[1]); break;
        case 'cd': executeCd(args[1]); break;
        case 'mkdir': executeMkdir(args[1]); break;
        case 'touch': executeTouch(args[1]); break;
        case 'echo': executeEcho(cmd.substring(5)); break;
        case 'cat': executeCat(args[1]); break;
        case 'cp': executeCp(args[1], args[2]); break;
        case 'mv': executeMv(args[1], args[2]); break;
        case '': break;
        default:
          if (command) appendLine(`Comando '${command}' não implementado.`, 'error');
      }
      
      // Verificar missão atual
      checkMissionCompletion(cmd);
    }

    function showHelp() {
      appendLine('📚 Comandos disponíveis:', 'info');
      gameState.unlockedCommands.forEach(cmd => {
        appendLine(`  • ${cmd}`, 'output');
      });
      appendLine('', 'output');
    }

    function showMission() {
      const mission = missions[gameState.currentMission - 1];
      if (mission) {
        appendLine('🎯 MISSÃO ATUAL:', 'mission');
        appendLine(`Nível ${mission.level}: ${mission.title}`, 'mission');
        appendLine(`${mission.description}`, 'mission');
        if (!gameState.completedMissions.includes(mission.level)) {
          appendLine(`💡 Dica: ${mission.hint}`, 'info');
        }
      }
    }

    function executeWhoami() {
      appendLine('aluno', 'output');
      checkMissionCompletion('whoami');
    }

    function executePwd() {
      appendLine(fileSystem.currentPath, 'output');
      checkMissionCompletion('pwd');
    }

    function executeLs(path) {
      const currentDir = getCurrentDirectory();
      const files = Object.keys(currentDir.content);
      if (files.length === 0) {
        appendLine('(vazio)', 'output');
      } else {
        files.forEach(file => {
          const item = currentDir.content[file];
          if (item.type === 'dir') {
            appendLine(`📁 ${file}/`, 'info');
          } else {
            appendLine(`📄 ${file}`, 'output');
          }
        });
      }
      checkMissionCompletion('ls');
    }

    function executeCd(path) {
      if (!path) {
        fileSystem.currentPath = '/home/aluno';
        appendLine('Diretório alterado para home.', 'success');
        return;
      }
      
      if (path === '..') {
        const parts = fileSystem.currentPath.split('/');
        parts.pop();
        fileSystem.currentPath = parts.join('/') || '/';
        appendLine(`Diretório: ${fileSystem.currentPath}`, 'output');
        return;
      }
      
      const currentDir = getCurrentDirectory();
      if (currentDir.content[path] && currentDir.content[path].type === 'dir') {
        fileSystem.currentPath = fileSystem.currentPath === '/' ? `/${path}` : `${fileSystem.currentPath}/${path}`;
        appendLine(`Diretório alterado para: ${fileSystem.currentPath}`, 'success');
      } else {
        appendLine(`cd: ${path}: Diretório não encontrado`, 'error');
      }
      
      checkMissionCompletion(`cd ${path}`);
    }

    function executeMkdir(name) {
      if (!name) {
        appendLine('mkdir: operando faltando', 'error');
        return;
      }
      
      const currentDir = getCurrentDirectory();
      if (currentDir.content[name]) {
        appendLine(`mkdir: não foi possível criar o diretório "${name}": Arquivo existe`, 'error');
      } else {
        currentDir.content[name] = { type: 'dir', content: {} };
        appendLine(`Diretório '${name}' criado com sucesso.`, 'success');
      }
      
      checkMissionCompletion(`mkdir ${name}`);
    }

    function executeTouch(name) {
      if (!name) {
        appendLine('touch: operando faltando', 'error');
        return;
      }
      
      const currentDir = getCurrentDirectory();
      if (!currentDir.content[name]) {
        currentDir.content[name] = { type: 'file', content: '' };
        appendLine(`Arquivo '${name}' criado.`, 'success');
      } else {
        appendLine(`Arquivo '${name}' já existe.`, 'info');
      }
      
      checkMissionCompletion(`touch ${name}`);
    }

    function executeEcho(args) {
      const match = args.match(/^"([^"]*)"\s*>\s*(.+)$/);
      if (match) {
        const content = match[1];
        const filename = match[2].trim();
        const currentDir = getCurrentDirectory();
        currentDir.content[filename] = { type: 'file', content: content };
        appendLine(`Conteúdo escrito em '${filename}'.`, 'success');
        checkMissionCompletion(`echo "${content}" > ${filename}`);
      } else {
        appendLine(args.replace(/^"|"$/g, ''), 'output');
      }
    }

    function executeCat(filename) {
      if (!filename) {
        appendLine('cat: operando faltando', 'error');
        return;
      }
      
      const currentDir = getCurrentDirectory();
      const file = currentDir.content[filename];
      if (file && file.type === 'file') {
        appendLine(file.content || '(arquivo vazio)', 'output');
      } else {
        appendLine(`cat: ${filename}: Arquivo não encontrado`, 'error');
      }
      
      checkMissionCompletion(`cat ${filename}`);
    }

    function executeCp(source, dest) {
      if (!source || !dest) {
        appendLine('cp: operandos faltando', 'error');
        return;
      }
      
      const currentDir = getCurrentDirectory();
      const sourceFile = currentDir.content[source];
      if (!sourceFile || sourceFile.type !== 'file') {
        appendLine(`cp: não foi possível localizar '${source}': Arquivo não encontrado`, 'error');
        return;
      }
      
      currentDir.content[dest] = { 
        type: 'file', 
        content: sourceFile.content 
      };
      appendLine(`Arquivo copiado para '${dest}'.`, 'success');
      
      checkMissionCompletion(`cp ${source} ${dest}`);
    }

    function executeMv(source, dest) {
      if (!source || !dest) {
        appendLine('mv: operandos faltando', 'error');
        return;
      }
      
      const currentDir = getCurrentDirectory();
      const sourceItem = currentDir.content[source];
      if (!sourceItem) {
        appendLine(`mv: não foi possível localizar '${source}': Arquivo não encontrado`, 'error');
        return;
      }
      
      currentDir.content[dest] = sourceItem;
      delete currentDir.content[source];
      appendLine(`Arquivo movido/renomeado para '${dest}'.`, 'success');
      
      checkMissionCompletion(`mv ${source} ${dest}`);
    }

    function getCurrentDirectory() {
      const parts = fileSystem.currentPath.split('/').filter(p => p);
      let current = fileSystem.structure;
      
      for (const part of parts) {
        if (current[`/${part}`]) {
          current = current[`/${part}`].content;
        } else if (current[part]) {
          current = current[part].content;
        } else {
          break;
        }
      }
      
      return current;
    }

    function checkMissionCompletion(cmd) {
      const currentMission = missions[gameState.currentMission - 1];
      
      if (!currentMission) return;
      
      if (gameState.completedMissions.includes(currentMission.level)) return;
      
      const cleanCmd = cmd.trim();
      const solutionCmd = currentMission.solution.trim();
      
      if (cleanCmd === solutionCmd) {
        completeMission(currentMission);
      }
    }

    function completeMission(mission) {
      gameState.completedMissions.push(mission.level);
      gameState.xp += mission.xpReward;
      
      appendLine('🎉 MISSÃO COMPLETADA!', 'success');
      appendLine(`+${mission.xpReward} XP ganhos!`, 'success');
      
      if (mission.unlockCommand) {
        gameState.unlockedCommands.push(mission.unlockCommand);
        appendLine(`🔓 Novo comando desbloqueado: ${mission.unlockCommand}`, 'info');
      }
      
      // Próximo nível
      if (gameState.currentMission < missions.length) {
        gameState.currentMission++;
        gameState.level = gameState.currentMission;
        
        if (gameState.xp >= gameState.xpToNextLevel) {
          gameState.xp -= gameState.xpToNextLevel;
          gameState.xpToNextLevel = Math.floor(gameState.xpToNextLevel * 1.2);
        }
        
        appendLine('', 'output');
        appendLine('✨ Nova missão disponível! Digite "missao" para ver.', 'info');
      } else {
        appendLine('🏆 PARABÉNS! Você completou todas as missões!', 'success');
        appendLine('Você é um verdadeiro Mestre do Terminal Linux!', 'success');
      }
      
      updateUI();
    }

    function updateUI() {
      // Atualizar nível
      levelBadge.textContent = `Nível ${gameState.level}/10`;
      levelDisplayHeader.textContent = gameState.level;
      
      // Atualizar XP
      const xpPercent = (gameState.xp / gameState.xpToNextLevel) * 100;
      xpBar.style.width = `${xpPercent}%`;
      xpText.textContent = `${gameState.xp}/${gameState.xpToNextLevel} XP`;
      
      // Atualizar listas de comandos
      updateCommandsList();
    }

    function updateCommandsList() {
      unlockedList.innerHTML = '';
      lockedList.innerHTML = '';
      
      allCommands.forEach(cmd => {
        const li = document.createElement('li');
        if (gameState.unlockedCommands.includes(cmd)) {
          li.className = 'unlocked';
          li.innerHTML = `<i class="fas fa-check-circle"></i> ${cmd}`;
          unlockedList.appendChild(li);
        } else {
          li.className = 'locked';
          li.innerHTML = `<i class="fas fa-lock"></i> ${cmd}`;
          lockedList.appendChild(li);
        }
      });
    }

    // Event Listeners
    commandInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const cmd = commandInput.value;
        processCommand(cmd);
        commandInput.value = '';
      }
    });

    document.addEventListener('click', focusInput);

    // Iniciar jogo
    init();
  })();
</script>
</body>
</html>
